<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изучение ПДД - Карточки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <div class="container">
            <h1 class="logo">🚦 ПДД Карточки</h1>
            <nav>
                <a href="./index.html" class="nav-link">На главную</a>
            </nav>
        </div>
    </header>

    <main class="container">

        <!-- Экран выбора режима -->
        <div id="mode-select-screen" class="mode-select-screen">
            <h2 class="mode-select-title">Выберите режим</h2>
            <p class="mode-select-subtitle">Как вы хотите изучать знаки дорожного движения?</p>

            <!-- Фильтры категорий -->
            <div class="category-filters" id="category-filters">
                <button class="category-btn active" onclick="filterCategory('all')">Все</button>
                <button class="category-btn" onclick="filterCategory('Предупреждающие')">Предупреждающие</button>
                <button class="category-btn" onclick="filterCategory('Приоритета')">Приоритета</button>
                <button class="category-btn" onclick="filterCategory('Запрещающие')">Запрещающие</button>
                <button class="category-btn" onclick="filterCategory('Предписывающие')">Предписывающие</button>
                <button class="category-btn" onclick="filterCategory('Информационные')">Информационные</button>
                <button class="category-btn" onclick="filterCategory('Сервис')">Знаки сервиса</button>
            </div>

            <div class="mode-cards">
                <button id="btn-learn" class="mode-card" onclick="startMode('learn')">
                    <span class="mode-card-icon">📖</span>
                    <h3>Режим обучения</h3>
                    <p>Знак + полное объяснение сразу видны. Листайте карточки в своём темпе.</p>
                </button>
                <button id="btn-test" class="mode-card" onclick="startMode('test')">
                    <span class="mode-card-icon">🧠</span>
                    <h3>Режим теста</h3>
                    <p>Видите знак и вопрос. Нажмите на карточку, чтобы открыть ответ.</p>
                </button>
            </div>
        </div>


        <!-- Экран карточки -->
        <div id="flashcard-screen" class="flashcard-screen hidden">
            <div class="flashcard-topbar">
                <button class="btn-back" onclick="backToMenu()">← Назад</button>
                <div class="mode-badge" id="mode-badge"></div>
                <div class="card-counter" id="card-counter">1 / 1</div>
            </div>

            <div class="progress-top-wrap">
                <div class="progress-bar-wrap">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <!-- Карточка -->
            <div class="flashcard-wrapper">

                <!-- Кнопка Назад (слева) -->
                <button class="nav-arrow nav-arrow-prev" id="btn-prev" onclick="prevCard()"
                    aria-label="Предыдущая карточка">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>

                <div class="flashcard-area">
                    <div id="flashcard" class="flashcard">
                        <div class="flashcard-inner" id="flashcard-inner">

                            <!-- Лицевая сторона -->
                            <div class="flashcard-front" id="flashcard-front">
                                <span class="card-category" id="fc-category"></span>
                                <img id="fc-image" src="" alt="Знак" class="flashcard-image">
                                <h3 id="fc-question" class="flashcard-question"></h3>
                            </div>

                            <!-- Обратная сторона (только в режиме теста) -->
                            <div class="flashcard-back" id="flashcard-back">
                                <div id="fc-answer" class="flashcard-answer"></div>
                                <p id="fc-details" class="flashcard-details"></p>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- Кнопка Вперёд (справа) -->
                <button class="nav-arrow nav-arrow-next" id="btn-next" onclick="nextCard()"
                    aria-label="Следующая карточка">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>

            </div>

            <div class="flashcard-meta">
                <!-- Подсказка для теста -->
                <p class="flip-hint" id="flip-hint">👆 Нажмите на карточку, чтобы увидеть ответ</p>
                <p class="details-below hidden" id="fc-details-below"></p>
            </div>
        </div>

    </main>

    <footer class="app-footer">
        <p>© 2026 ПДД Карточки. Учи правила легко.</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
